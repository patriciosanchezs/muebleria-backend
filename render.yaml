# Render Blueprint para despliegue automático
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: furniture-store-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon # Cambiar según tu ubicación
    plan: free # Opciones: free, starter, standard, pro
    branch: main
    rootDir: ./backend
    envVars:
      - key: MONGODB_URL
        sync: false # No sincronizar automáticamente, se debe configurar manualmente
      - key: JWT_SECRET
        generateValue: true # Render generará un valor aleatorio
      - key: JWT_EXPIRATION
        value: 86400000
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
    healthCheckPath: /api/actuator/health
    autoDeploy: true # Re-desplegar automáticamente en cada push

# Base de datos (si quieres usar PostgreSQL en lugar de MongoDB)
