spring:
  application:
    name: furniture-store
  
  data:
    mongodb:
      # MongoDB Atlas (Cloud)
      uri: ${MONGODB_URL}
      auto-index-creation: true
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

